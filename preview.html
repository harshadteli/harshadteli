<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Harshad Teli — Banner Preview</title>
<style>
  body { margin:0; font-family: Inter, system-ui, sans-serif; background:#0a0a0a; color:#e2e8f0; }
  h1 { font-size:14px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; opacity:.6; padding:24px 24px 8px; }
  .wrap { padding:0 24px 40px; display:grid; gap:28px; }
  .card { border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.08); background:#111; }
  .card img { width:100%; height:auto; display:block; }
  .label { padding:10px 14px; font-size:12px; color:#94a3b8; border-bottom:1px solid rgba(255,255,255,.06); }
</style>
</head>
<body>
  <h1>GitHub Profile Hero Preview</h1>
  <div class="wrap">
    <div class="card">
      <div class="label">dark.svg — Dark mode</div>
      <img src="dark.svg" alt="Dark banner"/>
    </div>
    <div class="card" style="background:#f8fafc">
      <div class="label" style="color:#475569;border-color:rgba(15,23,42,.08)">light.svg — Light mode</div>
      <img src="light.svg" alt="Light banner"/>
    </div>
  </div>
</body>
</html>
